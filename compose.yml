services:
  ib-gateway:
    container_name: ib-gateway
    restart: always
    image: ghcr.io/gnzsnz/ib-gateway:latest
    env_file:
      - .env
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}

      relogin_after_twofa_timeout: "yes"
      existing_session_detected_action: "primary"

      TIME_ZONE: America/New_York
      TZ: America/New_York

      READ_ONLY_API: "no"
      TWS_ACCEPT_INCOMING: "true"
    volumes:
      - ibgateway_jts:/home/ibgateway/Jts
    ports:
      - "4001:4001" # Live
      - "4002:4002" # Paper
      - "5900:5900"

  bot:
    container_name: algobot
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      IB_HOST: ib-gateway
      IB_PORT: "4002"
      CLIENT_ID: "2"

      DB_PATH: /data/algobot.db
      STATE_FILE: /data/bot_state.json
      REPORT_FILE: /reports/index.html
      CONFIG_FILE: /app/config.yaml

      TIME_ZONE: Europe/Prague
      TZ: Europe/Prague  
      
    volumes:
      - ./app:/app
      - ./volumes/data:/data
      - ./volumes/reports:/reports
    depends_on:
      - ib-gateway

  web:
    container_name: algobot-web
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: always
    environment:
      DB_PATH: /data/algobot.db
      BACKTEST_CACHE_DIR: /data/backtest_cache
      PYTHONPATH: /app
      TZ: Europe/Prague
    volumes:
      - ./app:/app
      - ./volumes/data:/data
      - ./volumes/reports:/reports
    expose:
      - "8081"
    depends_on:
      - bot

  dashboard:
    image: nginx:alpine
    container_name: algobot-dashboard
    restart: always
    volumes:
      - ./volumes/reports:/usr/share/nginx/html:ro
      - ./docker/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - bot
      - web

  heartbeat:
    image: alpine:3.20
    container_name: algobot-heartbeat
    restart: always
    env_file:
      - .env
    environment:
      STATUS_FILE: /reports/status.json
      HEARTBEAT_MAX_AGE_SEC: "600"
      HEARTBEAT_INTERVAL: "60"
      HEARTBEAT_ALERT_COOLDOWN_SEC: "1800"
    volumes:
      - ./volumes/reports:/reports:ro
      - ./docker/heartbeat/heartbeat.sh:/heartbeat.sh:ro
    command: ["sh", "/heartbeat.sh"]
    depends_on:
      - bot

volumes:
  ibgateway_jts: