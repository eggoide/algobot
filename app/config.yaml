capital:
  manual_capital_limit: 10000
  max_positions: 5
  fee_usd: 1.0

strategy:
  dip_mode: DAILY         # DAILY / HOURLY
  buy_drop: 0.025
  sell_gain: 0.05

  use_stop_loss: true
  stop_loss: 0.10

  rsi_limit: 28
  rsi_period: 14

  # RSI floor — extrémně přeprodané tituly (RSI < floor) jsou "falling knife": obvykle
  # za tak hlubokým oversold stojí fundamentální problém, ne dočasný dip.
  # Analýza 2026-07-23 (48 obchodů): RSI 25–28 => 93 % win, RSI < 15 => jen 50 % win.
  use_rsi_floor: true
  rsi_floor: 15                        # neBUYuj, pokud je vstupní RSI pod touto hodnotou

  use_sma_filter: false
  sma_period: 200

  # Corporate-action filter — skip BUY if recent split / large dividend / spinoff-like gap.
  # yfinance auto_adjust řeší splity a běžné dividendy, ale spinoffy (HON → Solstice apod.)
  # se projeví jako velký gap-down, který strategie chybně čte jako dip-buy signal.
  use_corp_action_filter: true
  corp_action_lookback_days: 5         # how far back to scan splits / dividends
  corp_action_gap_threshold: -0.05     # raw open-vs-prev-close gap that triggers skip
  corp_action_dividend_pct_threshold: 0.02   # dividend > X% of price = suspicious (special / spinoff)

  # Earnings filter — skip BUY, pokud je čtvrtletní výsledovka na spadnutí (nebo právě proběhla).
  # Dip před earnings = koupě event-risku; analýza 2026-07-23 ukázala, že 4 z 8 největších
  # SL ztrát (WMT, ACN, DE, COST) byly nákupy v okně výsledků. Používá yfinance kalendář,
  # fail-open při chybě (výpadek dat BUY neblokuje). Cache 12 h.
  use_earnings_filter: true
  earnings_lookahead_days: 7           # blokuj BUY, pokud jsou výsledky v následujících X dnech
  earnings_lookback_days: 1            # ... nebo max X dní zpět (čerstvý post-earnings gap)

  # Enhanced strategy options (used by EnhancedDipBuyStrategy)
  use_trailing_stop: true
  trailing_stop_pct: 0.03    # sell if price drops 2% from high water mark (only when in profit)

  use_time_stop: true
  time_stop_bars: 120        # close position after ~5 trading days (hourly bars)

  use_macd: false
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

  use_bollinger: true
  bb_period: 20
  bb_std: 2.0

  use_volume_filter: false
  volume_multiplier: 1.5

runtime:
  timezone: US/Eastern
  sp100_cache_file: /data/sp100_tickers_cache.txt
  sp100_cache_max_age_hours: 24
  # V7 — universe selection. "sp100_live" scrapes Wikipedia (current SP100,
  # survivorship-biased for backtests). "fixed" uses fixed_universe below.
  universe_mode: sp100_live
  fixed_universe:
    # ~30 stable large-caps continuously in SP100 since 2018. Reduces survivorship
    # bias but smaller universe = fewer signals. Used only when universe_mode=fixed.
    - AAPL
    - MSFT
    - GOOG
    - AMZN
    - META
    - NVDA
    - JPM
    - V
    - JNJ
    - WMT
    - PG
    - MA
    - HD
    - XOM
    - CVX
    - KO
    - PEP
    - MRK
    - PFE
    - ABBV
    - BAC
    - WFC
    - DIS
    - CSCO
    - INTC
    - VZ
    - T
    - MCD
    - NKE
    - IBM

backtest:
  # Realistic execution model. Defaults match IB paper trading.
  slippage_pct: 0.0005          # 5 bp per fill (≈ 0.05% each side)
  fee_model: ib                 # 'flat' = $fee_usd per trade, 'ib' = max($1, $0.005 × qty)
  use_next_open: true           # Fill orders at NEXT bar Open instead of signal bar Close (no look-ahead)
  auto_adjust: true             # yfinance auto_adjust (dividend-adjusted close). False = raw close.

report:
  show_candidates_rsi_below: 60
  candidates_limit: 15
  trades_table_limit: 10
  dashboard_refresh_closed_sec: 300
