server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep redirect Location headers relative so they survive Docker port mapping
    # (host:8080 → container:80). Without this, nginx rewrites to http://host/...
    # and the browser drops to port 80.
    absolute_redirect off;

    # ─────────────────────────────────────────────────────────
    # Static dashboard (trading statistics) — requires session
    # ─────────────────────────────────────────────────────────
    location / {
        auth_request /_auth_check;
        error_page 401 = @to_login;
        try_files $uri $uri/ =404;
    }

    # /backtest/* → Flask service (also protected)
    location /backtest/ {
        auth_request /_auth_check;
        error_page 401 = @to_login;
        proxy_pass http://web:8081/backtest/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # /v2/api/* → Flask service (dashboard v2 control API)
    location /v2/api/ {
        auth_request /_auth_check;
        error_page 401 = @to_login;
        proxy_pass http://web:8081/v2/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─────────────────────────────────────────────────────────
    # Auth endpoints (no auth_request — these ARE the login flow)
    # ─────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://web:8081/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal subrequest used by auth_request — validates session cookie via Flask
    location = /_auth_check {
        internal;
        proxy_pass http://web:8081/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    # Where unauthenticated requests get sent
    location @to_login {
        return 302 /auth/login;
    }
}
